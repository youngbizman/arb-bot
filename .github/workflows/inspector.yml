name: Run API Inspector

on:
  workflow_dispatch: # This allows you to run it manually with a button

jobs:
  run-inspector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pytz

      - name: Run Inspector Script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python inspector.py
